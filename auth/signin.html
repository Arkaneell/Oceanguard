<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OceanGuard | Secure Sign In</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Coastal Intelligence Platform">

    <link rel="stylesheet" href="signin.css">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
    <text y='75' font-size='75'>🌊</text></svg>">

    <!-- ✅ IMPORTANT: Module script (NO defer) -->
    <script type="module" src="signin.js"></script>
</head>

<body>

<div class="auth-container">

    <!-- LEFT PANEL -->
    <div class="auth-left">
        <div class="brand-content">
            <h1 class="logo">🌊 OceanGuard</h1>
            <h2>AI Coastal Intelligence Platform</h2>
            <p>
                Real-time disaster monitoring powered by predictive analytics.
            </p>
        </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="auth-right">
        <div class="auth-card">
            <h2>Welcome Back</h2>

            <!-- ✅ GOOGLE LOGIN -->
            <button id="googleLogin" type="button" class="google-btn">
                🔐 Continue with Google
            </button>

            <!-- Divider -->
            <div class="divider">
                <span>OR</span>
            </div>

            <!-- PHONE AUTH -->
            <section class="phone-section">

                <!-- PHONE INPUT -->
                <div id="phoneInputContainer">
                    <label for="phoneNumber">Phone Number</label>

                    <input 
                        type="tel" 
                        id="phoneNumber" 
                        placeholder="+919876543210"
                    >

                    <button id="sendOtp" type="button">
                        Send OTP
                    </button>
                </div>

                <!-- OTP -->
                <div id="otpContainer" class="hidden">
                    <label for="otpCode">OTP Code</label>

                    <input 
                        type="text" 
                        id="otpCode" 
                        placeholder="Enter OTP"
                        maxlength="6"
                    >

                    <button id="verifyOtp" type="button">
                        Verify & Continue
                    </button>
                </div>

            </section>

            <!-- ERROR -->
            <div id="errorMessage" class="error"></div>

            <!-- NOTE -->
            <p class="secure-note">🔒 Secured by Firebase</p>

            <!-- RECAPTCHA -->
            <div id="recaptcha-container"></div>

        </div>
    </div>

</div>

</body>
</html>
