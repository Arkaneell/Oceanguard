<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean Contact</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>
    <!-- Animated background waves -->
    <div class="wave-background">
        <svg class="waves" viewBox="0 0 1200 120" preserveAspectRatio="none">
            <path class="wave wave-1" d="M0,50 Q300,10 600,50 T1200,50 L1200,120 L0,120 Z" fill="rgba(6,33,51,0.1)"></path>
            <path class="wave wave-2" d="M0,60 Q300,20 600,60 T1200,60 L1200,120 L0,120 Z" fill="rgba(13,71,109,0.1)"></path>
            <path class="wave wave-3" d="M0,70 Q300,30 600,70 T1200,70 L1200,120 L0,120 Z" fill="rgba(0,105,148,0.1)"></path>
        </svg>
    </div>

    <div class="container">
        <!-- Header Section -->
        <div class="header">
            <div class="header-content">
                <h1 class="title">Get in Touch</h1>
                <p class="subtitle">Let's dive into your project together</p>
                <div class="accent-line"></div>
            </div>
        </div>

        <!-- Main Contact Form Section -->
        <div class="form-wrapper">
            <form id="contactForm" class="contact-form" novalidate>
                
                <!-- Name Field -->
                <div class="form-group">
                    <label for="name" class="form-label">
                        <span class="label-text">Full Name</span>
                        <span class="required">*</span>
                    </label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name" 
                        class="form-input" 
                        placeholder="Enter your full name"
                        required
                    >
                    <div class="error-message" id="nameError"></div>
                    <div class="input-focus-line"></div>
                </div>

                <!-- Email Field -->
                <div class="form-group">
                    <label for="email" class="form-label">
                        <span class="label-text">Email Address</span>
                        <span class="required">*</span>
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        placeholder="your@email.com"
                        required
                    >
                    <div class="error-message" id="emailError"></div>
                    <div class="input-focus-line"></div>
                </div>

                <!-- Subject Field -->
                <div class="form-group">
                    <label for="subject" class="form-label">
                        <span class="label-text">Subject</span>
                        <span class="required">*</span>
                    </label>
                    <input 
                        type="text" 
                        id="subject" 
                        name="subject" 
                        class="form-input" 
                        placeholder="What is this about?"
                        required
                    >
                    <div class="error-message" id="subjectError"></div>
                    <div class="input-focus-line"></div>
                </div>

                <!-- Message Field -->
                <div class="form-group">
                    <label for="message" class="form-label">
                        <span class="label-text">Message</span>
                        <span class="required">*</span>
                    </label>
                    <textarea 
                        id="message" 
                        name="message" 
                        class="form-textarea" 
                        placeholder="Tell us more about your project..."
                        rows="5"
                        required
                    ></textarea>
                    <div class="char-count"><span id="charCount">0</span>/500</div>
                    <div class="error-message" id="messageError"></div>
                    <div class="input-focus-line"></div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="submit-btn">
                    <span class="btn-text">Send Message</span>
                    <span class="btn-icon">→</span>
                    <div class="btn-ripple"></div>
                </button>

                <!-- Success Message -->
                <div class="success-message" id="successMessage">
                    <div class="success-icon">✓</div>
                    <p>Thank you! Your message has been sent successfully.</p>
                </div>
            </form>

            
    <!-- Floating particles effect -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <script src="contact.js"></script>
</body>
</html>
